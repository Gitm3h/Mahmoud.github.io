<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahmoud El Mekdad</title>
  <meta http-equiv="refresh" content="0; url=en/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1A3A5C;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(26,58,92,0.10);
      max-width: 380px;
      width: 90%;
    }
    h1 { font-size: 1.7rem; margin-bottom: 0.3rem; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 2rem; }
    .langs { display: flex; gap: 1rem; justify-content: center; }
    a.lang-btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a.lang-btn.primary { background: #1A3A5C; color: white; }
    a.lang-btn.primary:hover { background: #14304f; }
    a.lang-btn.secondary { background: #E8EFF6; color: #1A3A5C; }
    a.lang-btn.secondary:hover { background: #d0dded; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mahmoud El Mekdad</h1>
    <p>Redirecting to English… click below if it doesn't happen automatically.</p>
    <div class="langs">
      <a href="en/" class="lang-btn primary">English</a>
      <a href="de/" class="lang-btn secondary">Deutsch</a>
    </div>
  </div>
</body>
</html>
